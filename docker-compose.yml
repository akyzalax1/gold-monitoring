services:
  postgres:
    image: postgres:15
    container_name: gold_postgres
    environment:
      POSTGRES_USER: golduser
      POSTGRES_PASSWORD: goldpass
      POSTGRES_DB: gold_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golduser"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: gold_mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped

  collector:
    build: ./collector
    container_name: gold_collector
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # Поддержка нескольких топиков через запятую (переменная MQTT_TOPICS)
      MQTT_TOPICS: "/devices/+/controls/#"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: gold_monitoring
      DB_USER: golduser
      DB_PASSWORD: goldpass
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data: